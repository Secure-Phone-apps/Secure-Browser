name: Android CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1
          validate-wrappers: false

      - name: Prepare Environment File
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "GEMINI_API_KEY=dummy_key" > .env
          fi

      - name: Decode or Generate Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore from base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ -f debug.keystore.base64.txt ]; then
            echo "Decoding debug.keystore from base64.txt..."
            base64 -d debug.keystore.base64.txt > debug.keystore
          fi
          
          if [ ! -f debug.keystore ]; then
            echo "debug.keystore not found, generating a new one with keytool..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "debug.keystore successfully prepared."
          fi

      - name: Run Unit Tests
        run: gradle testDebugUnitTest --continue

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: secure-browser-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
